<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Control-M &rarr; Airflow migration dashboard</title>
<style>
  :root {
    --page: #0d0d0d;
    --surface: #1a1a19;
    --surface-2: #232322;
    --ink: #ffffff;
    --ink-2: #c3c2b7;
    --muted: #898781;
    --hair: #2c2c2a;
    --ring: rgba(255, 255, 255, 0.10);
    --accent: #3987e5;
    --series-a: #3987e5;   /* components */
    --series-b: #d95926;   /* single-entry */
    --warn: #fab219;
    --error: #d03b3b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--page);
    color: var(--ink);
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    overflow: hidden;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex; align-items: center; gap: 18px;
    padding: 10px 16px; border-bottom: 1px solid var(--hair);
    background: var(--surface); flex-wrap: wrap;
  }
  .brand h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.01em; }
  .brand .sub { font-size: 11px; color: var(--muted); }
  nav#tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .tab {
    appearance: none; border: 1px solid transparent; background: transparent;
    color: var(--ink-2); font: inherit; font-size: 13px;
    padding: 6px 12px; border-radius: 7px; cursor: pointer;
  }
  .tab:hover { background: var(--surface-2); color: var(--ink); }
  .tab.active {
    background: var(--surface-2); color: var(--ink);
    border-color: var(--ring); box-shadow: inset 0 -2px 0 var(--accent);
  }
  .scopewrap {
    display: flex; align-items: center; gap: 7px; margin-left: auto;
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
  }
  #scope-select {
    background: var(--page); color: var(--ink);
    border: 1px solid var(--hair); border-radius: 7px;
    padding: 6px 8px; font: inherit; font-size: 13px;
    text-transform: none; letter-spacing: normal; font-weight: 400;
    max-width: 220px;
  }
  #scope-select:focus { outline: none; border-color: var(--accent); }
  .foldertoggle {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;
    cursor: pointer; user-select: none;
  }
  .foldertoggle input { accent-color: var(--accent); cursor: pointer; margin: 0; }
  #search {
    width: 200px;
    background: var(--page); color: var(--ink);
    border: 1px solid var(--hair); border-radius: 7px;
    padding: 6px 10px; font: inherit; font-size: 13px;
  }
  #search:focus { outline: none; border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  main { flex: 1; position: relative; min-height: 0; }
  .view { position: absolute; inset: 0; display: none; }
  .view.active { display: flex; }
  #view-compare.active, #view-run.active { display: block; overflow: auto; }

  .graph-view .gmain { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .graph-view .canvas { flex: 1; min-height: 0; background: var(--page); }
  .toolbar {
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 8px 12px; border-bottom: 1px solid var(--hair);
    background: var(--surface);
  }
  .tlabel {
    font-size: 10.5px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .seg {
    display: inline-flex; border: 1px solid var(--hair);
    border-radius: 7px; overflow: hidden; background: var(--page);
  }
  .segbtn {
    appearance: none; border: none; background: transparent;
    color: var(--ink-2); font: inherit; font-size: 12.5px;
    padding: 5px 12px; cursor: pointer;
  }
  .segbtn + .segbtn { border-left: 1px solid var(--hair); }
  .segbtn:hover { background: var(--surface-2); color: var(--ink); }
  .segbtn.active { background: var(--surface-2); color: var(--ink); box-shadow: inset 0 -2px 0 var(--accent); }
  .dagpick { display: flex; align-items: center; gap: 7px; }
  .dagpick[hidden] { display: none; }
  .dag-select {
    background: var(--page); color: var(--ink);
    border: 1px solid var(--hair); border-radius: 7px;
    padding: 5px 8px; font: inherit; font-size: 12.5px; max-width: 340px;
  }
  .dag-select:focus { outline: none; border-color: var(--accent); }
  .graph-view .legend {
    width: 270px; flex: none; overflow-y: auto;
    border-left: 1px solid var(--hair); background: var(--surface);
    padding: 12px 14px;
  }
  .legend h2 {
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em; margin: 10px 0 6px;
  }
  .legend h2:first-child { margin-top: 0; }
  .lrow {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 4px; border-radius: 6px; font-size: 12.5px; color: var(--ink-2);
  }
  .lrow.clickable { cursor: pointer; }
  .lrow.clickable:hover { background: var(--surface-2); color: var(--ink); }
  .chip { width: 10px; height: 10px; border-radius: 50%; flex: none; }
  .chip-line { width: 18px; height: 3px; border-radius: 2px; flex: none; }
  .lname { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lcount { color: var(--muted); font-variant-numeric: tabular-nums; font-size: 11.5px; }
  .lnote { font-size: 11px; color: var(--muted); margin: 2px 0 0 22px; }
  .badge {
    font-size: 10px; color: var(--muted); border: 1px solid var(--hair);
    border-radius: 4px; padding: 0 4px; flex: none;
  }

  /* vis-network tooltip (the JS toggles visibility; we supply the skin) */
  div.vis-tooltip {
    position: absolute; visibility: hidden; pointer-events: none; z-index: 6;
    white-space: pre-line; max-width: 360px;
    background: var(--surface-2); color: var(--ink-2);
    border: 1px solid var(--ring); border-radius: 8px;
    padding: 8px 10px; font: 12px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
  }
  div.vis-tooltip::first-line { color: var(--ink); font-weight: 600; }

  /* ---------------- comparison + run views ---------------- */
  #compare-content, #run-content { max-width: 1080px; margin: 0 auto; padding: 22px 24px 60px; }
  .card {
    background: var(--surface); border: 1px solid var(--hair);
    border-radius: 10px; padding: 16px 18px; margin-bottom: 18px;
  }
  .card h2 { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
  .card .hint { font-size: 12px; color: var(--muted); margin: -6px 0 10px; }
  table.ctable { border-collapse: collapse; width: 100%; font-size: 13px; }
  table.ctable th {
    text-align: left; font-size: 10.5px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    padding: 6px 10px; border-bottom: 1px solid var(--hair);
  }
  table.ctable td {
    padding: 6px 10px; border-bottom: 1px solid var(--hair);
    color: var(--ink-2); vertical-align: top;
  }
  table.ctable tr:last-child td { border-bottom: none; }
  table.ctable td.num, table.ctable th.num {
    text-align: right; font-variant-numeric: tabular-nums;
  }
  table.ctable td.metric { color: var(--ink); }
  .tablewrap { overflow-x: auto; }

  .serieskey { display: flex; gap: 16px; font-size: 12px; color: var(--ink-2); margin-bottom: 10px; }
  .serieskey .chip { border-radius: 3px; width: 10px; height: 10px; }

  .histo { display: grid; grid-template-columns: 64px 1fr; row-gap: 10px; align-items: center; }
  .histo .blabel { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .hbars { display: flex; flex-direction: column; gap: 2px; }
  .hbar { display: flex; align-items: center; gap: 8px; height: 14px; }
  .hfill { height: 100%; border-radius: 0 4px 4px 0; min-width: 2px; }
  .hfill.a { background: var(--series-a); }
  .hfill.b { background: var(--series-b); }
  .hval { font-size: 11.5px; color: var(--ink-2); font-variant-numeric: tabular-nums; }

  .pill {
    display: inline-block; margin: 1px 4px 1px 0; padding: 1px 7px;
    border: 1px solid var(--hair); border-radius: 999px;
    font-size: 11.5px; color: var(--ink-2); background: var(--page);
    font-variant-numeric: tabular-nums;
  }
  td .split-warn { color: var(--warn); }
  .scopetag {
    display: inline-block; padding: 0 7px; border-radius: 999px;
    border: 1px solid var(--hair); background: var(--page);
    font-size: 11.5px; color: var(--ink);
  }
  td.filecell { font-size: 12px; color: var(--muted); word-break: break-all; }

  .diaggrid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 800px) { .diaggrid { grid-template-columns: 1fr; } }
  .diagcol h3 { font-size: 12px; font-weight: 600; color: var(--ink-2); margin-bottom: 8px; }
  ul.diaglist { list-style: none; }
  ul.diaglist li {
    font-size: 12.5px; color: var(--ink-2); padding: 5px 0;
    border-bottom: 1px solid var(--hair);
  }
  ul.diaglist li:last-child { border-bottom: none; }
  .lvl {
    display: inline-block; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em;
    border: 1px solid var(--hair); border-radius: 4px;
    padding: 0 5px; margin-right: 7px; color: var(--muted);
  }
  .lvl.warn { color: var(--warn); border-color: var(--warn); }
  .lvl.error { color: var(--error); border-color: var(--error); }
  .code { color: var(--ink); font-weight: 600; margin-right: 6px; }
  .subj { color: var(--muted); }
  .empty { color: var(--muted); font-size: 12.5px; font-style: italic; }
</style>
<script>/* vis-network (inlined from the local pyvis package; no CDN) */
@@VIS_JS@@
</script>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <h1>Control-M &rarr; Airflow migration</h1>
      <div class="sub">DAG partitioning &mdash; components vs single-entry</div>
    </div>
    <nav id="tabs">
      <button class="tab active" data-view="structure">Control-M structure</button>
      <button class="tab" data-view="components">Components strategy</button>
      <button class="tab" data-view="single">Single-entry strategy</button>
      <button class="tab" data-view="full">Condition graph</button>
      <button class="tab" data-view="compare">Comparison</button>
      <button class="tab" data-view="run">Run overview</button>
    </nav>
    <label class="scopewrap" for="scope-select">Scope
      <select id="scope-select" title="Conversion scope (one per input XML file)"></select>
    </label>
    <label class="foldertoggle" for="folder-toggle"
           title="Synthetic folder start/end nodes are hidden in every view by default; edges are contracted through them. Tick to show them.">
      <input type="checkbox" id="folder-toggle">Show folder nodes
    </label>
    <input id="search" type="search" placeholder="Search jobs&hellip;" autocomplete="off">
  </header>
  <main>
    <section id="view-structure" class="view graph-view active">
      <div class="gmain">
        <div class="toolbar">
          <span class="tlabel">Layout</span>
          <div class="seg" id="layout-toggle">
            <button class="segbtn active" data-layout="level">Level-wise</button>
            <button class="segbtn" data-layout="force">Force</button>
          </div>
        </div>
        <div class="canvas" id="net-structure"></div>
      </div>
      <aside class="legend" id="legend-structure"></aside>
    </section>
    <section id="view-components" class="view graph-view">
      <div class="gmain">
        <div class="toolbar">
          <div class="seg mode-toggle" data-strat="components">
            <button class="segbtn active" data-mode="overview">Partition overview</button>
            <button class="segbtn" data-mode="dag">DAG graph</button>
          </div>
          <div class="dagpick" id="olayout-wrap-components"><span class="tlabel">Layout</span>
            <div class="seg olayout" id="olayout-components" data-strat="components">
              <button class="segbtn active" data-layout="level">Level-wise</button>
              <button class="segbtn" data-layout="force">Force</button>
            </div>
          </div>
          <label class="dagpick" id="dagpick-components" hidden><span class="tlabel">DAG</span>
            <select id="dag-select-components" class="dag-select"></select>
          </label>
        </div>
        <div class="canvas" id="net-components"></div>
      </div>
      <aside class="legend" id="legend-components"></aside>
    </section>
    <section id="view-single" class="view graph-view">
      <div class="gmain">
        <div class="toolbar">
          <div class="seg mode-toggle" data-strat="single">
            <button class="segbtn active" data-mode="overview">Partition overview</button>
            <button class="segbtn" data-mode="dag">DAG graph</button>
          </div>
          <div class="dagpick" id="olayout-wrap-single"><span class="tlabel">Layout</span>
            <div class="seg olayout" id="olayout-single" data-strat="single">
              <button class="segbtn active" data-layout="level">Level-wise</button>
              <button class="segbtn" data-layout="force">Force</button>
            </div>
          </div>
          <label class="dagpick" id="dagpick-single" hidden><span class="tlabel">DAG</span>
            <select id="dag-select-single" class="dag-select"></select>
          </label>
        </div>
        <div class="canvas" id="net-single"></div>
      </div>
      <aside class="legend" id="legend-single"></aside>
    </section>
    <section id="view-full" class="view graph-view">
      <div class="gmain">
        <div class="canvas" id="net-full"></div>
      </div>
      <aside class="legend" id="legend-full"></aside>
    </section>
    <section id="view-compare" class="view">
      <div id="compare-content"></div>
    </section>
    <section id="view-run" class="view">
      <div id="run-content"></div>
    </section>
  </main>
</div>

<script id="ctm-data" type="application/json">@@DATA_JSON@@</script>

<script>
(function () {
  'use strict';

  var DATA = JSON.parse(document.getElementById('ctm-data').textContent);

  var INK2 = '#c3c2b7';
  var EDGE_NEUTRAL = '#6f6f69';
  var UNASSIGNED = '#55554f';
  /* dark-surface categorical slots (validated dataviz palette) */
  var PALETTE = ['#3987e5', '#199e70', '#c98500', '#008300',
                 '#9085e9', '#e66767', '#d55181', '#d95926'];
  var KIND_COLORS = {
    'E': EDGE_NEUTRAL,
    'PREV_RUN': '#9085e9',
    'REVIEW': '#e66767',
    'CYCLIC': '#c98500',
    'HUB': '#d95926',
    'PATTERN': '#3987e5',
    'MANUAL': '#e8e7e0',
    'AUTO_RESOLVED': '#199e70',
    'ANCHOR': '#d55181',
    'OWNER_SPLIT': '#008300'
  };

  function kindColor(k) { return KIND_COLORS[k] || '#8a8a84'; }

  /* task-kind styling for the per-DAG graph view (v5).
     Identity = shape + border style FIRST, hue second (CVD-safe: color is
     never the only encoding). solid = real work, dashed = synthetic control. */
  var TASK_KINDS = {
    job:          { color: '#3987e5', shape: 'box',     dashes: false, fill: true,  label: 'job (solid box)' },
    gate:         { color: '#9085e9', shape: 'diamond', dashes: true,  fill: false, label: 'gate (time/day guard)' },
    wait:         { color: '#c98500', shape: 'ellipse', dashes: true,  fill: false, label: 'wait (external sensor)' },
    confirm:      { color: '#d55181', shape: 'ellipse', dashes: true,  fill: false, label: 'confirm (approval)' },
    force:        { color: '#d95926', shape: 'box',     dashes: false, fill: true,  label: 'force (trigger DAG run)' },
    folder_start: { color: '#55554f', shape: 'dot',     dashes: false, fill: true,  label: 'folder start/end', size: 5 },
    folder_end:   { color: '#55554f', shape: 'dot',     dashes: false, fill: true,  label: 'folder start/end', size: 5 }
  };
  var GHOST_INK = '#898781';   /* ghost/external stubs: dotted outline, muted */

  function colorAt(i) {
    if (i < PALETTE.length) { return PALETTE[i]; }
    /* deterministic golden-angle fallback beyond the 8 validated slots */
    var hue = (i * 137.508) % 360;
    return 'hsl(' + hue.toFixed(1) + ', 52%, 60%)';
  }

  function categoryColors(values) {
    var m = {};
    values.forEach(function (v, i) { m[v] = colorAt(i); });
    return m;
  }

  function esc(s) {
    return String(s === null || s === undefined ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  /* ---------------- per-scope state (v2: scope = one XML file) ---------- */

  var currentScope = DATA.scopes[0];
  var S = null;          /* DATA.per_scope[currentScope] */
  var nodeInfo = {};
  var degree = {};
  var built = {};        /* view -> {net, nodes DataSet, base node array} */

  /* v5 view state */
  var structureLayout = 'level';                            /* 'level' | 'force' */
  var stratMode = { components: 'overview', single: 'overview' };
  var stratDag = { components: '', single: '' };            /* selected dag_id */

  /* v5.1 view state: synthetic folder start/end nodes are DISPLAY-filtered in
     every view by default (edges contracted transitively through them); one
     global "Show folder nodes" toggle restores them everywhere. The generated
     DAG .py files are untouched — this is presentation only. */
  var showFolders = false;
  /* v5.1: partition overviews default to the level-wise hierarchical layout */
  var overviewLayout = { components: 'level', single: 'level' };

  function computeScopeState() {
    S = DATA.per_scope[currentScope];
    nodeInfo = {};
    S.nodes.forEach(function (n) { nodeInfo[n.id] = n; });
    degree = {};
    function bump(id) { degree[id] = (degree[id] || 0) + 1; }
    S.e_edges.forEach(function (e) { bump(e.source); bump(e.target); });
    S.w_edges.forEach(function (e) { bump(e.source); bump(e.target); });
  }

  function tooltip(n, lvl) {
    var lines = [n.id];
    lines.push('scope: ' + currentScope);
    lines.push('folder: ' + n.folder + (n.synthetic ? '  (synthetic)' : ''));
    lines.push('type: ' + n.task_type + (n.cyclic ? '  · cyclic' : ''));
    lines.push('day pattern: ' + (n.day_pattern || 'condition-driven'));
    lines.push('level: ' + lvl
      + (n.cycle ? '  · on a cycle — level approximated' : ''));
    if (n.timefrom) { lines.push('timefrom: ' + n.timefrom); }
    lines.push('dag (components): ' + (n.dag_a || '—'));
    lines.push('dag (single-entry): ' + (n.dag_b || '—'));
    return lines.join('\n');
  }

  /* v5.1: renders the given (already folder-filtered) node list; `levels` is
     the post-contraction level map for hierarchical layouts, or null (force) */
  function makeNodes(list, keyFn, colorMap, levels) {
    return list.map(function (n) {
      var key = keyFn(n);
      var c = (key !== null && key !== undefined && colorMap[key]) || UNASSIGNED;
      var lvl = levels ? (levels[n.id] || 0) : n.level;
      var node = {
        id: n.id,
        label: n.name,
        title: tooltip(n, lvl),
        shape: n.cyclic ? 'hexagon' : (n.synthetic ? 'diamond' : 'dot'),
        size: 7 + Math.min(11, degree[n.id] || 0),
        borderWidth: 1,
        opacity: n.synthetic ? 0.55 : 1,   /* synthetic folder nodes muted */
        color: {
          background: c, border: c,
          highlight: { background: c, border: '#ffffff' },
          hover: { background: c, border: '#ffffff' }
        },
        font: { color: INK2, size: 11, face: 'system-ui', strokeWidth: 0 }
      };
      if (levels) { node.level = lvl; }   /* drives hierarchical ranks */
      return node;
    });
  }

  function edgeObj(from, to, opts) {
    return {
      from: from, to: to,
      arrows: { to: { enabled: true, scaleFactor: 0.5 } },
      dashes: !!opts.dashed,
      width: opts.dashed ? 1.6 : 1,
      color: {
        color: opts.color, opacity: opts.dashed ? 0.95 : 0.55,
        highlight: '#ffffff', hover: '#ffffff'
      },
      title: opts.title,
      smooth: opts.hier
        ? { enabled: true, type: 'cubicBezier', forceDirection: 'horizontal', roundness: 0.4 }
        : { enabled: true, type: 'dynamic' }
    };
  }

  /* -------- v5.1: folder-node filtering + transitive edge contraction ---- */

  function visibleNodes() {
    if (showFolders) { return S.nodes; }
    return S.nodes.filter(function (n) { return !n.synthetic; });
  }

  function hiddenNodeIds() {
    if (showFolders) { return []; }
    return S.nodes.filter(function (n) { return n.synthetic; })
      .map(function (n) { return n.id; });
  }

  function isFolderKind(t) {
    return t.kind === 'folder_start' || t.kind === 'folder_end';
  }

  /* folder of a removed structure node (graph.json nodes carry .folder) */
  function structFolderOf(id) {
    var n = nodeInfo[id];
    return (n && n.folder) ? n.folder : id;
  }

  /* folder of a removed dag-plan task: source_uid is
     "<FOLDER PATH>/__FOLDER_START__|__FOLDER_END__" for structural tasks */
  function taskFolderOf(tasksById) {
    return function (id) {
      var t = tasksById[id];
      if (t && t.source_uid) {
        return t.source_uid.replace(/\/__FOLDER_(START|END)__$/, '');
      }
      return id;
    };
  }

  function viaText(via) {
    if (!via || !via.length) { return ''; }
    return '\nvia ' + via.slice().sort().join(', ') + ' gate';
  }

  function condText(conds) {
    return (conds || []).slice().sort().join(', ');
  }

  /* longest-path levels AFTER contraction (JS port of build.py's
     compute_levels: roots = 0, cycle guard, deterministic sorted order). */
  function computeLevelsJS(ids, pairs) {
    ids = ids.slice().sort();
    var known = {}, succ = {}, pred = {}, indeg = {};
    ids.forEach(function (n) { known[n] = true; succ[n] = []; pred[n] = []; indeg[n] = 0; });
    var seen = {};
    pairs.slice().sort(function (a, b) {
      var ka = a[0] + '\u0000' + a[1], kb = b[0] + '\u0000' + b[1];
      return ka < kb ? -1 : (ka > kb ? 1 : 0);
    }).forEach(function (p) {
      var s = p[0], t = p[1], k = s + '\u0000' + t;
      if (s === t || !known[s] || !known[t] || seen[k]) { return; }
      seen[k] = true;
      succ[s].push(t); pred[t].push(s); indeg[t] += 1;
    });
    var levels = {}, best = {}, remaining = {}, queue = [];
    ids.forEach(function (n) {
      remaining[n] = indeg[n];
      if (indeg[n] === 0) { queue.push(n); }
    });
    while (queue.length) {
      queue.sort();
      var node = queue.shift();
      levels[node] = best[node] || 0;
      succ[node].forEach(function (nxt) {
        best[nxt] = Math.max(best[nxt] || 0, levels[node] + 1);
        remaining[nxt] -= 1;
        if (remaining[nxt] === 0) { queue.push(nxt); }
      });
    }
    /* cycle guard: sorted, so earlier approximations feed later ones */
    ids.filter(function (n) { return !(n in levels); }).forEach(function (node) {
      var got = pred[node].filter(function (p) { return p in levels; })
        .map(function (p) { return levels[p]; });
      levels[node] = got.length ? Math.max.apply(null, got) + 1 : 0;
    });
    return levels;
  }

  /* Contract edges transitively through every hidden node: each removed node
     connects each of its predecessors to each of its successors (dedupe by
     source|target, no self-edges). Contracted edges keep normal styling; the
     tooltip notes "via <folder> gate". Edge recs:
     {source, target, kind, mechanism, conds:[], via:[], dashed} */
  function contractHidden(edges, hiddenIds, folderOf) {
    var out = {}, order = [];
    function key(s, t) { return s + '\u0000' + t; }
    function mergeInto(list, items) {
      (items || []).forEach(function (x) {
        if (list.indexOf(x) < 0) { list.push(x); }
      });
    }
    function addEdge(rec) {
      var k = key(rec.source, rec.target);
      var have = out[k];
      if (!have) { out[k] = rec; order.push(k); return; }
      mergeInto(have.conds, rec.conds);
      mergeInto(have.via, rec.via);
      if (rec.dashed && !have.dashed) {
        have.dashed = true; have.kind = rec.kind; have.mechanism = rec.mechanism;
      }
    }
    edges.forEach(function (e) {
      if (e.source === e.target) { return; }
      addEdge({
        source: e.source, target: e.target,
        kind: e.kind || 'E', mechanism: e.mechanism || '',
        conds: (e.conds || []).slice(), via: (e.via || []).slice(),
        dashed: !!e.dashed
      });
    });
    hiddenIds.slice().sort().forEach(function (h) {
      var ins = [], outs = [];
      order.forEach(function (k) {
        var e = out[k];
        if (!e) { return; }
        if (e.target === h) { ins.push(e); }
        if (e.source === h) { outs.push(e); }
        if (e.source === h || e.target === h) { delete out[k]; }
      });
      order = order.filter(function (k) { return out[k]; });
      var label = folderOf(h);
      ins.forEach(function (pe) {
        outs.forEach(function (se) {
          if (pe.source === se.target) { return; }   /* no self-edges */
          var via = pe.via.slice();
          mergeInto(via, [label]);
          mergeInto(via, se.via);
          var conds = pe.conds.slice();
          mergeInto(conds, se.conds);
          addEdge({
            source: pe.source, target: se.target,
            kind: pe.dashed ? pe.kind : (se.dashed ? se.kind : pe.kind),
            mechanism: pe.dashed ? pe.mechanism : (se.dashed ? se.mechanism : (pe.mechanism || se.mechanism)),
            conds: conds, via: via,
            dashed: pe.dashed || se.dashed
          });
        });
      });
    });
    return Object.keys(out).sort().map(function (k) { return out[k]; });
  }

  /* ---------------- legends ---------------- */

  function legendEl(view) { return document.getElementById('legend-' + view); }

  function lrow(color, name, count, extra) {
    return '<div class="lrow' + (extra && extra.click ? ' clickable" data-sel="' + esc(extra.click) + '"' : '"') + '>'
      + '<span class="' + (extra && extra.line ? 'chip-line' : 'chip') + '" style="background:' + color + '"></span>'
      + '<span class="lname" title="' + esc(name) + '">' + esc(name) + '</span>'
      + (extra && extra.badge ? '<span class="badge">' + esc(extra.badge) + '</span>' : '')
      + (count !== null && count !== undefined ? '<span class="lcount">' + esc(count) + '</span>' : '')
      + '</div>';
  }

  function renderFolderLegend(view, cmap, eCount) {
    var html = '<h2>Folders</h2>';
    S.folders.forEach(function (f) {
      html += lrow(cmap[f.name] || UNASSIGNED, f.name, f.n_jobs + ' jobs',
        { badge: (f.smart ? 'smart' : null), click: 'folder:' + f.name });
      if (f.datacenter) { html += '<div class="lnote">' + esc(f.datacenter) + '</div>'; }
    });
    html += '<h2>Edges</h2>' + lrow(EDGE_NEUTRAL, 'condition (E)', eCount, { line: true });
    if (!showFolders) {
      html += '<div class="lnote">folder start/end nodes hidden — edges are '
        + 'contracted through them (toggle in the header)</div>';
    }
    legendEl(view).innerHTML = html;
  }

  function renderDagLegend(view, strat, cmap, dagKey) {
    var html = '<h2>DAGs (' + strat.dags.length + ') — ' + esc(strat.strategy) + '</h2>';
    strat.dags.forEach(function (d) {
      var sched = d.dataset_triggered ? 'dataset-triggered'
        : (d.schedule ? d.schedule : 'no schedule');
      html += lrow(cmap[d.dag_id], d.dag_id, d.n_jobs, { click: dagKey + ':' + d.dag_id });
      html += '<div class="lnote">' + esc(sched) + '</div>';
    });
    html += '<h2>Cross-DAG links (' + strat.cross_links.length + ')</h2>';
    var kinds = {};
    strat.cross_links.forEach(function (c) { kinds[c.kind] = (kinds[c.kind] || 0) + 1; });
    Object.keys(kinds).sort().forEach(function (k) {
      html += lrow(kindColor(k), k, kinds[k], { line: true });
    });
    if (strat.cross_links.length === 0) { html += '<div class="empty">none</div>'; }
    legendEl(view).innerHTML = html;
  }

  /* kinds legend for the per-DAG task-graph sub-mode (v5) */
  function renderDagGraphLegend(view, strat, dagId, plan, shown) {
    var html = '<h2>DAG</h2>';
    if (!plan) {
      html += '<div class="empty">no dag_plans entry for ' + esc(dagId) + '</div>';
      legendEl(view).innerHTML = html;
      return;
    }
    var sched = plan.dataset_triggered ? 'dataset-triggered'
      : (plan.schedule ? plan.schedule : 'no schedule');
    html += '<div class="lrow"><span class="lname" title="' + esc(dagId) + '">'
      + esc(dagId) + '</span><span class="lcount">' + plan.tasks.length + ' tasks</span></div>';
    html += '<div class="lnote">' + esc(sched) + '</div>';
    if (shown.length < plan.tasks.length) {
      html += '<div class="lnote">' + (plan.tasks.length - shown.length)
        + ' folder start/end task(s) hidden — edges contracted through them '
        + '(toggle in the header)</div>';
    }
    plan.datasets.forEach(function (ds) {
      html += '<div class="lnote">' + esc(ds) + '</div>';
    });

    var counts = {};
    shown.forEach(function (t) {
      var st = TASK_KINDS[t.kind] || TASK_KINDS.job;
      counts[st.label] = (counts[st.label] || 0) + 1;
    });
    html += '<h2 class="kinds-legend">Task kinds</h2>';
    var seen = {};
    ['job', 'gate', 'wait', 'confirm', 'force', 'folder_start', 'folder_end']
      .forEach(function (k) {
        var st = TASK_KINDS[k];
        if (seen[st.label] || !(st.label in counts)) { return; }
        seen[st.label] = true;
        html += lrow(st.color, st.label, counts[st.label],
          { badge: st.dashes ? 'dashed' : null });
      });
    html += lrow(GHOST_INK, 'ghost / external stub',
      (plan.dataset_triggered ? plan.datasets.length : 0)
        + plan.outlets.length + plan.external_waits.length,
      { badge: 'dotted' });
    html += '<div class="lnote">solid = real work · dashed border = generated '
      + 'control task · dotted ghost = outside this DAG</div>';

    html += '<h2>Cross-DAG context</h2>';
    html += lrow(GHOST_INK, 'external waits', plan.external_waits.length, { line: true });
    plan.external_waits.slice(0, 10).forEach(function (w) {
      html += '<div class="lnote">' + esc(w.external_dag_id + '.' + w.external_task_id)
        + ' → ' + esc(w.task_id) + '</div>';
    });
    html += lrow(GHOST_INK, 'outlet datasets', plan.outlets.length, { line: true });
    plan.outlets.slice(0, 10).forEach(function (o) {
      html += '<div class="lnote">' + esc(o.task_id) + ' → ' + esc(o.dataset) + '</div>';
    });
    legendEl(view).innerHTML = html;
  }

  function renderKindLegend(view, kindCounts) {
    var html = '<h2>Edge kinds</h2>';
    Object.keys(kindCounts).sort().forEach(function (k) {
      html += lrow(kindColor(k), k, kindCounts[k], { line: true });
    });
    html += '<h2>Review lists</h2>';
    html += lrow('#e66767', 'orphan conditions', S.orphan_conds.length, { line: true });
    S.orphan_conds.slice(0, 12).forEach(function (o) {
      html += '<div class="lnote">' + esc(o.cond) + '</div>';
    });
    html += lrow('#c98500', 'dead-end conditions', S.dead_end_conds.length, { line: true });
    S.dead_end_conds.slice(0, 12).forEach(function (o) {
      html += '<div class="lnote">' + esc(o.cond) + '</div>';
    });
    legendEl(view).innerHTML = html;
  }

  /* ---------------- view builders ---------------- */

  function dagA(n) { return n.dag_a; }
  function dagB(n) { return n.dag_b; }

  function buildStructure() {
    var hier = structureLayout === 'level';
    var cmap = categoryColors(S.folders.map(function (f) { return f.name; }));
    var vnodes = visibleNodes();
    var contracted = contractHidden(S.e_edges.map(function (e) {
      return { source: e.source, target: e.target, kind: 'E', conds: e.conds };
    }), hiddenNodeIds(), structFolderOf);
    var edges = contracted.map(function (e) {
      return edgeObj(e.source, e.target, {
        color: EDGE_NEUTRAL, hier: hier,
        title: 'E — ' + condText(e.conds) + viaText(e.via)
      });
    });
    /* levels for the hierarchical layout are computed AFTER contraction */
    var levels = hier
      ? computeLevelsJS(vnodes.map(function (n) { return n.id; }),
          contracted.map(function (e) { return [e.source, e.target]; }))
      : null;
    renderFolderLegend('structure', cmap, edges.length);
    return {
      nodes: makeNodes(vnodes, function (n) { return n.folder; }, cmap, levels),
      edges: edges,
      hier: hier
    };
  }

  function buildStrategy(view, strat, keyFn, dagKey) {
    /* v5.1: level-wise hierarchical layout by DEFAULT (Force is the toggle);
       levels are longest-path over the union of intra-DAG edges and
       cross-links, computed after folder-node contraction. */
    var hier = overviewLayout[view] === 'level';
    var cmap = categoryColors(strat.dags.map(function (d) { return d.dag_id; }));
    var raw = S.e_edges.map(function (e) {
      return { source: e.source, target: e.target, kind: 'E', conds: e.conds };
    });
    strat.cross_links.forEach(function (c) {
      raw.push({
        source: c.source, target: c.target, kind: c.kind,
        mechanism: c.mechanism, conds: c.conds, dashed: true
      });
    });
    var edges = [], pairs = [];
    contractHidden(raw, hiddenNodeIds(), structFolderOf).forEach(function (e) {
      var a = nodeInfo[e.source], b = nodeInfo[e.target];
      if (!a || !b) { return; }
      if (e.dashed) {           /* cross-DAG link (possibly contracted) */
        edges.push(edgeObj(e.source, e.target, {
          color: kindColor(e.kind), dashed: true, hier: hier,
          title: 'cross-DAG ' + e.kind + ' via ' + e.mechanism + ' — '
            + condText(e.conds) + viaText(e.via)
        }));
        pairs.push([e.source, e.target]);
        return;
      }
      var da = keyFn(a), db = keyFn(b);
      if (da && da === db) {
        edges.push(edgeObj(e.source, e.target, {
          color: EDGE_NEUTRAL, hier: hier,
          title: 'intra-DAG — ' + condText(e.conds) + viaText(e.via)
        }));
        pairs.push([e.source, e.target]);
      }
    });
    var vnodes = visibleNodes();
    var levels = hier
      ? computeLevelsJS(vnodes.map(function (n) { return n.id; }), pairs)
      : null;
    renderDagLegend(view, strat, cmap, dagKey);
    return { nodes: makeNodes(vnodes, keyFn, cmap, levels), edges: edges, hier: hier };
  }

  /* -------- per-DAG task graph (v5): dag_plans.json, hierarchical LR ----- */

  function taskTooltip(t, dagId, lvl) {
    var lines = [t.task_id];
    lines.push('dag: ' + dagId);
    lines.push('kind: ' + t.kind + '  · operator: ' + t.operator);
    if (t.source_uid) { lines.push('Control-M job: ' + t.source_uid); }
    if (t.task_group) { lines.push('task group: ' + t.task_group); }
    lines.push('upstream: ' + t.upstream.length);
    lines.push('level: ' + lvl
      + (t.cycle ? '  · on a cycle — level approximated' : ''));
    return lines.join('\n');
  }

  function taskNode(t, dagId, lvl) {
    var st = TASK_KINDS[t.kind] || TASK_KINDS.job;
    var inside = st.shape === 'box' || st.shape === 'ellipse';
    var bg = st.fill ? st.color : '#232322';
    return {
      id: t.task_id,
      label: t.task_id + (t.kind === 'job' && t.operator ? '\n' + t.operator : ''),
      title: taskTooltip(t, dagId, lvl),
      level: lvl,
      shape: st.shape,
      size: st.size || 12,
      borderWidth: st.dashes ? 1.6 : 1,
      shapeProperties: { borderDashes: st.dashes ? [5, 3] : false },
      opacity: 1,
      color: {
        background: bg, border: st.color,
        highlight: { background: bg, border: '#ffffff' },
        hover: { background: bg, border: '#ffffff' }
      },
      font: {
        color: (inside && st.fill) ? '#ffffff' : INK2,
        size: 11, face: 'system-ui', strokeWidth: 0, multi: false
      }
    };
  }

  /* ghost external stubs: dotted outline, muted, tooltip only */
  function ghostNode(id, label, level, title, shape) {
    return {
      id: id, label: label, title: title, level: level,
      shape: shape, size: 10,
      borderWidth: 1.4,
      shapeProperties: { borderDashes: [2, 4] },
      chosen: false,
      color: {
        background: '#1a1a19', border: GHOST_INK,
        highlight: { background: '#1a1a19', border: GHOST_INK },
        hover: { background: '#1a1a19', border: GHOST_INK }
      },
      font: { color: GHOST_INK, size: 10.5, face: 'system-ui', strokeWidth: 0 }
    };
  }

  function ghostEdge(from, to, title) {
    var e = edgeObj(from, to, { color: GHOST_INK, dashed: true, hier: true, title: title });
    e.width = 1;
    return e;
  }

  function buildDagGraph(view, strat) {
    var dagId = stratDag[view];
    var plan = strat.dag_plans[dagId];
    if (!plan) {
      renderDagGraphLegend(view, strat, dagId, plan, []);
      return { nodes: [], edges: [], hier: true };
    }

    /* v5.1: folder_start / folder_end tasks are hidden by default; their
       edges are contracted transitively and levels recomputed afterwards. */
    var tasksById = {};
    plan.tasks.forEach(function (t) { tasksById[t.task_id] = t; });
    var shown = plan.tasks.filter(function (t) {
      return showFolders || !isFolderKind(t);
    });
    var hidden = plan.tasks.filter(function (t) {
      return !showFolders && isFolderKind(t);
    }).map(function (t) { return t.task_id; });
    renderDagGraphLegend(view, strat, dagId, plan, shown);

    var raw = [];
    plan.tasks.forEach(function (t) {
      t.upstream.forEach(function (u) {
        if (!tasksById[u]) { return; }
        raw.push({ source: u, target: t.task_id, kind: 'E', conds: [] });
      });
    });
    var contracted = contractHidden(raw, hidden, taskFolderOf(tasksById));

    /* dataset-triggered DAGs get ghost inbound datasets at rank 0 */
    var shift = (plan.dataset_triggered && plan.datasets.length) ? 1 : 0;
    var base = computeLevelsJS(
      shown.map(function (t) { return t.task_id; }),
      contracted.map(function (e) { return [e.source, e.target]; }));
    var nodes = [], edges = [];
    var levelOf = {}, hasUpstream = {};
    shown.forEach(function (t) { levelOf[t.task_id] = (base[t.task_id] || 0) + shift; });
    contracted.forEach(function (e) { hasUpstream[e.target] = true; });

    shown.forEach(function (t) {
      nodes.push(taskNode(t, dagId, levelOf[t.task_id]));
    });
    contracted.forEach(function (e) {
      edges.push(edgeObj(e.source, e.target, {
        color: EDGE_NEUTRAL, hier: true,
        title: e.source + ' → ' + e.target + viaText(e.via)
      }));
    });

    if (shift) {
      var roots = shown.filter(function (t) { return !hasUpstream[t.task_id]; });
      plan.datasets.forEach(function (ds) {
        var gid = 'ghost_ds_in:' + ds;
        nodes.push(ghostNode(gid, ds, 0,
          'inbound dataset (triggers this DAG)\n' + ds, 'database'));
        roots.forEach(function (r) {
          edges.push(ghostEdge(gid, r.task_id, 'dataset trigger → ' + r.task_id));
        });
      });
    }

    /* nearest VISIBLE upstream tasks of a hidden folder task (deterministic) */
    function visibleAnchorsUp(id) {
      var seen = {}, found = {}, stack = [id];
      while (stack.length) {
        var cur = stack.pop();
        if (seen[cur]) { continue; }
        seen[cur] = true;
        var t = tasksById[cur];
        if (!t) { continue; }
        t.upstream.forEach(function (u) {
          if (!tasksById[u]) { return; }
          if (u in levelOf) { found[u] = true; } else { stack.push(u); }
        });
      }
      return Object.keys(found).sort();
    }

    plan.outlets.forEach(function (o) {
      var gid = 'ghost_ds_out:' + o.task_id + ':' + o.dataset;
      if (o.task_id in levelOf) {
        nodes.push(ghostNode(gid, o.dataset,
          levelOf[o.task_id] + 1,
          'outlet dataset (produced by ' + o.task_id + ')\n' + o.dataset, 'database'));
        edges.push(ghostEdge(o.task_id, gid, o.task_id + ' → dataset'));
        return;
      }
      /* producer is a hidden folder node: re-home onto its visible upstreams */
      var anchors = visibleAnchorsUp(o.task_id);
      var lvl = shift;
      anchors.forEach(function (a) { lvl = Math.max(lvl, levelOf[a] + 1); });
      nodes.push(ghostNode(gid, o.dataset, lvl,
        'outlet dataset (produced by ' + o.task_id
        + ' — hidden folder node)\n' + o.dataset, 'database'));
      anchors.forEach(function (a) {
        edges.push(ghostEdge(a, gid,
          a + ' → dataset' + viaText([taskFolderOf(tasksById)(o.task_id)])));
      });
    });

    plan.external_waits.forEach(function (w) {
      if (!(w.task_id in levelOf)) { return; }
      var ext = w.external_dag_id + '.' + w.external_task_id;
      var gid = 'ghost_ext:' + w.task_id + ':' + ext;
      nodes.push(ghostNode(gid, ext,
        levelOf[w.task_id] - 1,
        'external task (in another DAG)\n' + ext + '\nawaited by ' + w.task_id, 'box'));
      edges.push(ghostEdge(gid, w.task_id, ext + ' → ' + w.task_id));
    });

    return { nodes: nodes, edges: edges, hier: true };
  }

  function buildFull() {
    var cmap = categoryColors(S.folders.map(function (f) { return f.name; }));
    var raw = [];
    S.e_edges.forEach(function (e) {
      raw.push({ source: e.source, target: e.target, kind: e.kind, conds: e.conds });
    });
    S.w_edges.forEach(function (e) {
      raw.push({ source: e.source, target: e.target, kind: e.kind,
                 conds: e.conds, dashed: true });
    });
    var kindCounts = {};
    var edges = [];
    contractHidden(raw, hiddenNodeIds(), structFolderOf).forEach(function (e) {
      kindCounts[e.kind] = (kindCounts[e.kind] || 0) + 1;
      edges.push(edgeObj(e.source, e.target, {
        color: kindColor(e.kind), dashed: e.dashed,
        title: e.kind + ' — ' + condText(e.conds) + viaText(e.via)
      }));
    });
    renderKindLegend('full', kindCounts);
    return {
      nodes: makeNodes(visibleNodes(), function (n) { return n.folder; }, cmap),
      edges: edges
    };
  }

  /* ---------------- networks: build lazily per scope, freeze on settle -- */

  function netOptions(nNodes, hier) {
    var interaction = { hover: true, tooltipDelay: 120, hideEdgesOnDrag: true, multiselect: true };
    if (hier) {
      /* level-wise (Backstage-style): explicit node.level drives the ranks;
         deterministic, physics OFF */
      return {
        autoResize: true,
        layout: {
          randomSeed: 7,
          hierarchical: {
            enabled: true, direction: 'LR', sortMethod: 'directed',
            levelSeparation: 180, nodeSpacing: 48, treeSpacing: 64,
            blockShifting: true, edgeMinimization: true, parentCentralization: false
          }
        },
        physics: { enabled: false },
        interaction: interaction,
        nodes: { borderWidth: 1 },
        edges: { selectionWidth: 1.5 }
      };
    }
    return {
      autoResize: true,
      layout: { randomSeed: 7, improvedLayout: nNodes <= 200 },
      interaction: interaction,
      physics: {
        enabled: true,
        solver: 'forceAtlas2Based',
        forceAtlas2Based: {
          gravitationalConstant: -46, centralGravity: 0.008,
          springLength: 110, springConstant: 0.06, avoidOverlap: 0.4
        },
        maxVelocity: 40, minVelocity: 0.75,
        stabilization: { enabled: true, iterations: 250, updateInterval: 30 }
      },
      nodes: { borderWidth: 1 },
      edges: { selectionWidth: 1.5 }
    };
  }

  function ensureNetwork(view) {
    if (built[view] || view === 'compare' || view === 'run') { return; }
    var data =
      view === 'structure' ? buildStructure() :
      view === 'components' ? (stratMode.components === 'dag'
        ? buildDagGraph('components', S.a)
        : buildStrategy('components', S.a, dagA, 'dag_a')) :
      view === 'single' ? (stratMode.single === 'dag'
        ? buildDagGraph('single', S.b)
        : buildStrategy('single', S.b, dagB, 'dag_b')) :
      buildFull();
    var nodesDS = new vis.DataSet(data.nodes);
    var edgesDS = new vis.DataSet(data.edges);
    var net = new vis.Network(document.getElementById('net-' + view),
      { nodes: nodesDS, edges: edgesDS }, netOptions(data.nodes.length, data.hier));
    if (data.hier) {
      /* physics is off: layout is immediate, just frame it */
      net.fit({ animation: false });
    } else {
      net.once('stabilizationIterationsDone', function () {
        net.setOptions({ physics: { enabled: false } });  /* freeze for responsiveness */
        net.fit({ animation: false });
      });
    }
    built[view] = { net: net, nodes: nodesDS, base: data.nodes };
    var legend = legendEl(view);
    if (legend) {
      /* onclick (not addEventListener) so scope switches replace the handler */
      legend.onclick = function (ev) {
        var row = ev.target.closest ? ev.target.closest('.lrow.clickable') : null;
        if (!row) { return; }
        var sel = row.getAttribute('data-sel').split(':');
        var field = sel[0], value = sel.slice(1).join(':');
        var ids = S.nodes.filter(function (n) { return n[field] === value; })
          .map(function (n) { return n.id; })
          .filter(function (id) { return nodesDS.get(id) !== null; });
        if (ids.length) {
          net.selectNodes(ids);
          net.fit({ nodes: ids, animation: true });
        }
      };
    }
    applySearch();
  }

  /* ---------------- scope selector ---------------- */

  var scopeSel = document.getElementById('scope-select');
  DATA.scopes.forEach(function (s) {
    var o = document.createElement('option');
    o.value = s;
    o.textContent = s;
    scopeSel.appendChild(o);
  });
  scopeSel.value = currentScope;
  scopeSel.addEventListener('change', function () { setScope(scopeSel.value); });

  function setScope(scope) {
    if (!DATA.per_scope[scope] || scope === currentScope) { return; }
    currentScope = scope;
    Object.keys(built).forEach(function (v) { built[v].net.destroy(); });
    built = {};
    computeScopeState();
    populateDagSelects();
    renderCompare();
    ensureNetwork(active);   /* no-op for compare/run */
  }

  /* ---------------- v5 controls: layout toggle, sub-mode, DAG selector --- */

  function rebuild(view) {
    if (built[view]) {
      built[view].net.destroy();
      delete built[view];
    }
    if (view === active) { ensureNetwork(view); }
  }

  document.querySelectorAll('#layout-toggle .segbtn').forEach(function (b) {
    b.addEventListener('click', function () {
      var mode = b.getAttribute('data-layout');
      if (mode === structureLayout) { return; }
      structureLayout = mode;
      document.querySelectorAll('#layout-toggle .segbtn').forEach(function (x) {
        x.classList.toggle('active', x === b);
      });
      rebuild('structure');
    });
  });

  /* v5.1: ONE global toggle restores folder nodes in ALL views (default off) */
  var folderToggle = document.getElementById('folder-toggle');
  folderToggle.checked = showFolders;
  folderToggle.addEventListener('change', function () {
    showFolders = folderToggle.checked;
    Object.keys(built).forEach(function (v) { built[v].net.destroy(); });
    built = {};
    ensureNetwork(active);
  });

  /* v5.1: per-strategy overview layout toggle (Level-wise default | Force) */
  document.querySelectorAll('.olayout').forEach(function (seg) {
    var view = seg.getAttribute('data-strat');
    seg.querySelectorAll('.segbtn').forEach(function (b) {
      b.addEventListener('click', function () {
        var mode = b.getAttribute('data-layout');
        if (mode === overviewLayout[view]) { return; }
        overviewLayout[view] = mode;
        seg.querySelectorAll('.segbtn').forEach(function (x) {
          x.classList.toggle('active', x === b);
        });
        if (stratMode[view] === 'overview') { rebuild(view); }
      });
    });
  });

  document.querySelectorAll('.mode-toggle').forEach(function (seg) {
    var view = seg.getAttribute('data-strat');
    seg.querySelectorAll('.segbtn').forEach(function (b) {
      b.addEventListener('click', function () {
        var mode = b.getAttribute('data-mode');
        if (mode === stratMode[view]) { return; }
        stratMode[view] = mode;
        seg.querySelectorAll('.segbtn').forEach(function (x) {
          x.classList.toggle('active', x === b);
        });
        document.getElementById('dagpick-' + view).hidden = (mode !== 'dag');
        document.getElementById('olayout-wrap-' + view).hidden = (mode === 'dag');
        rebuild(view);
      });
    });
  });

  function stratOf(view) { return view === 'components' ? S.a : S.b; }

  function populateDagSelects() {
    ['components', 'single'].forEach(function (view) {
      var sel = document.getElementById('dag-select-' + view);
      var plans = stratOf(view).dag_plans;
      var ids = Object.keys(plans).sort();
      sel.innerHTML = '';
      ids.forEach(function (id) {
        var o = document.createElement('option');
        o.value = id;
        o.textContent = id + ' (' + plans[id].tasks.length + ' tasks)';
        sel.appendChild(o);
      });
      if (ids.indexOf(stratDag[view]) < 0) { stratDag[view] = ids[0] || ''; }
      sel.value = stratDag[view];
    });
  }

  ['components', 'single'].forEach(function (view) {
    document.getElementById('dag-select-' + view)
      .addEventListener('change', function () {
        stratDag[view] = this.value;
        if (stratMode[view] === 'dag') { rebuild(view); }
      });
  });

  /* ---------------- tabs ---------------- */

  var active = 'structure';

  function activate(view) {
    active = view;
    document.querySelectorAll('.tab').forEach(function (t) {
      t.classList.toggle('active', t.getAttribute('data-view') === view);
    });
    document.querySelectorAll('.view').forEach(function (v) {
      v.classList.toggle('active', v.id === 'view-' + view);
    });
    ensureNetwork(view);
    if (built[view]) { built[view].net.redraw(); }
  }

  document.querySelectorAll('.tab').forEach(function (t) {
    t.addEventListener('click', function () { activate(t.getAttribute('data-view')); });
  });

  /* ---------------- search: highlight matches, dim the rest ------------- */

  var searchBox = document.getElementById('search');
  searchBox.addEventListener('input', applySearch);

  function applySearch() {
    var b = built[active];
    if (!b) { return; }
    var q = searchBox.value.trim().toLowerCase();
    var updates = b.base.map(function (n) {
      var baseOpacity = (n.opacity === undefined) ? 1 : n.opacity;
      var baseBorder = (n.borderWidth === undefined) ? 1 : n.borderWidth;
      if (!q) {
        return { id: n.id, opacity: baseOpacity, borderWidth: baseBorder, color: n.color };
      }
      if (n.id.toLowerCase().indexOf(q) >= 0) {
        var c = JSON.parse(JSON.stringify(n.color));
        c.border = '#ffffff';
        return { id: n.id, opacity: 1, borderWidth: 3, color: c };
      }
      return { id: n.id, opacity: 0.15, borderWidth: baseBorder, color: n.color };
    });
    b.nodes.update(updates);
  }

  /* ---------------- comparison view (per selected scope) ---------------- */

  var STAT_KEYS = ['n_jobs', 'n_dags', 'n_cross_links', 'cross_links_by_kind',
    'cross_links_by_mechanism', 'single_job_dags', 'multi_root_dags',
    'dataset_triggered_dags', 'largest_dag', 'size_histogram'];
  var BUCKETS = ['1', '2-5', '6-15', '16-50', '51+'];

  function fmtStat(key, v) {
    if (v === null || v === undefined) { return '—'; }
    if (typeof v === 'object') {
      var keys = Object.keys(v);
      if (key === 'size_histogram') {
        keys = BUCKETS.filter(function (b) { return b in v; });
      } else { keys.sort(); }
      if (keys.length === 0) { return '—'; }
      return keys.map(function (k) { return esc(k) + ': ' + esc(v[k]); }).join(', ');
    }
    return esc(v);
  }

  function statsTable() {
    var h = '<div class="card"><h2>Stats — side by side <span class="scopetag">scope: '
      + esc(currentScope) + '</span></h2><div class="tablewrap">'
      + '<table class="ctable"><thead><tr><th>metric</th>'
      + '<th>components</th><th>single-entry</th></tr></thead><tbody>';
    STAT_KEYS.forEach(function (k) {
      h += '<tr><td class="metric">' + esc(k) + '</td>'
        + '<td>' + fmtStat(k, S.a.stats[k]) + '</td>'
        + '<td>' + fmtStat(k, S.b.stats[k]) + '</td></tr>';
    });
    return h + '</tbody></table></div></div>';
  }

  function histogram() {
    var ha = S.a.stats.size_histogram || {};
    var hb = S.b.stats.size_histogram || {};
    var max = 1;
    BUCKETS.forEach(function (b) {
      max = Math.max(max, ha[b] || 0, hb[b] || 0);
    });
    var h = '<div class="card"><h2>DAG size histogram</h2>'
      + '<div class="hint">tasks per DAG, bucketed</div>'
      + '<div class="serieskey">'
      + '<span><span class="chip" style="background:var(--series-a)"></span> components</span>'
      + '<span><span class="chip" style="background:var(--series-b)"></span> single-entry</span>'
      + '</div><div class="histo">';
    BUCKETS.forEach(function (b) {
      var va = ha[b] || 0, vb = hb[b] || 0;
      h += '<div class="blabel">' + esc(b) + '</div><div class="hbars">'
        + '<div class="hbar"><div class="hfill a" style="width:' + (va / max * 100).toFixed(1) + '%"></div><span class="hval">' + va + '</span></div>'
        + '<div class="hbar"><div class="hfill b" style="width:' + (vb / max * 100).toFixed(1) + '%"></div><span class="hval">' + vb + '</span></div>'
        + '</div>';
    });
    return h + '</div></div>';
  }

  function divergenceTable() {
    var h = '<div class="card"><h2>Divergence — components DAG vs single-entry placement</h2>'
      + '<div class="hint">where each components-strategy DAG’s jobs landed under the single-entry strategy</div>'
      + '<div class="tablewrap"><table class="ctable"><thead><tr>'
      + '<th>components DAG</th><th class="num">jobs</th><th>single-entry DAGs</th>'
      + '<th class="num">co-grouped</th><th class="num">split off</th></tr></thead><tbody>';
    S.divergence.forEach(function (r) {
      var pills = r.targets.map(function (t) {
        return '<span class="pill">' + esc(t.dag_b) + ' ×' + t.count + '</span>';
      }).join('');
      h += '<tr><td class="metric">' + esc(r.dag_a) + '</td>'
        + '<td class="num">' + r.n_jobs + '</td>'
        + '<td>' + pills + '</td>'
        + '<td class="num">' + r.co_grouped + '</td>'
        + '<td class="num">' + (r.split > 0 ? '<span class="split-warn">' + r.split + '</span>' : r.split) + '</td></tr>';
    });
    if (S.divergence.length === 0) {
      h += '<tr><td colspan="5" class="empty">no DAGs</td></tr>';
    }
    return h + '</tbody></table></div></div>';
  }

  function diagList(strat) {
    if (!strat.diagnostics.length) { return '<div class="empty">no diagnostics</div>'; }
    var h = '<ul class="diaglist">';
    strat.diagnostics.forEach(function (d) {
      h += '<li><span class="lvl ' + esc(d.level) + '">' + esc(d.level) + '</span>'
        + '<span class="code">' + esc(d.code) + '</span>'
        + esc(d.message)
        + (d.subject ? ' <span class="subj">— ' + esc(d.subject) + '</span>' : '')
        + '</li>';
    });
    return h + '</ul>';
  }

  function diagnostics() {
    return '<div class="card"><h2>Diagnostics</h2><div class="diaggrid">'
      + '<div class="diagcol"><h3>components (' + S.a.diagnostics.length + ')</h3>' + diagList(S.a) + '</div>'
      + '<div class="diagcol"><h3>single-entry (' + S.b.diagnostics.length + ')</h3>' + diagList(S.b) + '</div>'
      + '</div></div>';
  }

  function renderCompare() {
    document.getElementById('compare-content').innerHTML =
      statsTable() + histogram() + divergenceTable() + diagnostics();
  }

  /* ---------------- run-level view (cross-scope; independent of selector) */

  function runOverviewCard() {
    var h = '<div class="card"><h2>Scopes — per-XML overview (' + DATA.run.overview.length + ')</h2>'
      + '<div class="hint">each input XML file is an independent conversion scope; A = components, B = single-entry</div>'
      + '<div class="tablewrap"><table class="ctable" id="scope-overview-table"><thead><tr>'
      + '<th>scope</th><th>source file</th><th class="num">jobs</th>'
      + '<th class="num">DAGs A</th><th class="num">DAGs B</th>'
      + '<th class="num">x-links A</th><th class="num">x-links B</th>'
      + '<th class="num">diags A</th><th class="num">diags B</th></tr></thead><tbody>';
    DATA.run.overview.forEach(function (r) {
      h += '<tr><td class="metric"><span class="scopetag">' + esc(r.scope) + '</span></td>'
        + '<td class="filecell">' + esc(r.file) + '</td>'
        + '<td class="num">' + esc(r.a.n_jobs) + '</td>'
        + '<td class="num">' + esc(r.a.n_dags) + '</td>'
        + '<td class="num">' + esc(r.b.n_dags) + '</td>'
        + '<td class="num">' + esc(r.a.n_cross_links) + '</td>'
        + '<td class="num">' + esc(r.b.n_cross_links) + '</td>'
        + '<td class="num">' + esc(r.a.diagnostics) + '</td>'
        + '<td class="num">' + esc(r.b.diagnostics) + '</td></tr>';
    });
    return h + '</tbody></table></div></div>';
  }

  function crossScopeCard() {
    var links = DATA.run.cross_scope_links;
    var h = '<div class="card"><h2>Cross-scope condition links (' + links.length + ')</h2>'
      + '<div class="hint">condition matches severed by the one-XML scope rule — review whether the '
      + 'boundary is real or the estate should be exported into one file</div>'
      + '<div class="tablewrap"><table class="ctable" id="cross-scope-table"><thead><tr>'
      + '<th>condition</th><th>producer scope</th><th>producer job</th>'
      + '<th>consumer scope</th><th>consumer job</th></tr></thead><tbody>';
    links.forEach(function (l) {
      h += '<tr><td class="metric">' + esc(l.cond) + '</td>'
        + '<td><span class="scopetag">' + esc(l.producer_scope) + '</span></td>'
        + '<td>' + esc(l.producer) + '</td>'
        + '<td><span class="scopetag">' + esc(l.consumer_scope) + '</span></td>'
        + '<td>' + esc(l.consumer) + '</td></tr>';
    });
    if (links.length === 0) {
      h += '<tr><td colspan="5" class="empty">no cross-scope condition matches</td></tr>';
    }
    return h + '</tbody></table></div></div>';
  }

  function collisionTable(rows) {
    if (!rows.length) { return '<div class="empty">no collisions</div>'; }
    var h = '<div class="tablewrap"><table class="ctable"><thead><tr>'
      + '<th>dag_id</th><th>kept by</th><th>renamed in</th><th>renamed to</th>'
      + '</tr></thead><tbody>';
    rows.forEach(function (c) {
      h += '<tr><td class="metric">' + esc(c.dag_id) + '</td>'
        + '<td><span class="scopetag">' + esc(c.kept_by) + '</span></td>'
        + '<td><span class="scopetag">' + esc(c.renamed_in) + '</span></td>'
        + '<td>' + esc(c.renamed_to) + '</td></tr>';
    });
    return h + '</tbody></table></div>';
  }

  function collisionsCard() {
    var ca = DATA.run.dag_id_collisions.a;
    var cb = DATA.run.dag_id_collisions.b;
    return '<div class="card" id="dag-collisions"><h2>DAG id collisions across scopes ('
      + (ca.length + cb.length) + ')</h2>'
      + '<div class="hint">dag_ids stay unique across scopes (one Airflow instance); '
      + 'later scopes are renamed to &lt;scope&gt;__&lt;dag_id&gt;</div>'
      + '<div class="diaggrid">'
      + '<div class="diagcol"><h3>components (' + ca.length + ')</h3>' + collisionTable(ca) + '</div>'
      + '<div class="diagcol"><h3>single-entry (' + cb.length + ')</h3>' + collisionTable(cb) + '</div>'
      + '</div></div>';
  }

  function renderRun() {
    document.getElementById('run-content').innerHTML =
      runOverviewCard() + crossScopeCard() + collisionsCard();
  }

  /* ---------------- boot ---------------- */
  computeScopeState();
  populateDagSelects();
  renderCompare();
  renderRun();
  activate('structure');
})();
</script>
</body>
</html>
